<!DOCTYPE html>
<!-- ============================================================
     数独游戏 - HTML 骨架
     ============================================================
     本文件只负责 DOM 结构，样式在 sudoku.css，逻辑在 sudoku.js。
     如果你想调整页面布局（比如加按钮、改顺序），改这里即可。
     ============================================================ -->
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <!-- 视口设置：让页面在手机上正确缩放 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>数独游戏</title>
    <!-- Inter 字体（现代感来源） -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <!-- 引用外部样式表 -->
    <link rel="stylesheet" href="sudoku.css" />
</head>
<body>

    <!-- ==========================================================
         主容器 — 包裹整个游戏面板
         背景模糊毛玻璃效果在 CSS 中实现
         ========================================================== -->
    <div class="container">

        <!-- 标题区域 -->
        <h1>数 独</h1>
        <p class="subtitle">— 逻辑 · 专注 · 挑战 —</p>

        <!-- -------------------------------------------------------
             顶部信息栏：计时器 + 错误计数
             timerDisplay 和 mistakesCount 的文本由 JS 动态更新
             ------------------------------------------------------- -->
        <div class="game-header">
            <div class="timer">⏱️ <span id="timerDisplay">00:00</span></div>
            <div class="mistakes">❌ 错误 <span id="mistakesCount">0</span> / 3</div>
        </div>

        <!-- -------------------------------------------------------
             难度选择按钮组
             data-diff 属性告诉 JS 对应哪个难度等级
             默认 "easy" 高亮（class="active"）
             ------------------------------------------------------- -->
        <div class="difficulty-wrap">
            <button data-diff="easy" class="active">简单</button>
            <button data-diff="medium">中等</button>
            <button data-diff="hard">困难</button>
            <button data-diff="expert">专家</button>
        </div>

        <!-- -------------------------------------------------------
             数独棋盘容器
             #board 是 9×9 网格，由 JS 动态生成每个格子
             board-wrapper 只负责居中布局
             ------------------------------------------------------- -->
        <div class="board-row">
            <!-- 棋盘 -->
            <div class="board-wrapper">
                <div class="sudoku-board" id="board"></div>
            </div>
            <!-- 右侧操作面板 -->
            <div class="side-panel">
                <!-- 功能按钮（参考图风格：4个一行）-->
                <div class="action-buttons">
                    <button class="erase-btn" data-num="0">✕</button>
                    <button class="notes-toggle" id="notesToggle">标记</button>
                    <button class="warning" id="hintBtn">💡<span class="hint-count" id="hintCount">3</span></button>
                    <button class="mark-cell-btn" id="markCellBtn">候选</button>
                </div>
                <!-- 数字键：3×3 九宫格 -->
                <div class="num-grid">
                    <button data-num="1">1</button>
                    <button data-num="2">2</button>
                    <button data-num="3">3</button>
                    <button data-num="4">4</button>
                    <button data-num="5">5</button>
                    <button data-num="6">6</button>
                    <button data-num="7">7</button>
                    <button data-num="8">8</button>
                    <button data-num="9">9</button>
                </div>
                <!-- 次级操作 -->
                <div class="secondary-actions">
                    <button class="candidate-edit-btn" id="candidateEditBtn">编辑</button>
                    <button class="success" id="solveBtn">解答</button>
                </div>
                <!-- 新游戏（独立全宽，参考图风格） -->
                <button class="new-game-btn" id="newGameBtn">✦ 新游戏</button>
            </div>
        </div>

    </div>

    <!-- 引用外部 JavaScript 文件 -->
    <script src="sudoku.js"></script>
</body>
</html>
