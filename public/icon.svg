<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- 9x9 grid -->
  <g fill="none" stroke="rgba(255,255,255,.3)" stroke-width="6">
    <line x1="113" y1="56" x2="113" y2="456"/>
    <line x1="170" y1="56" x2="170" y2="456"/>
    <line x1="227" y1="56" x2="227" y2="456"/>
    <line x1="284" y1="56" x2="284" y2="456"/>
    <line x1="341" y1="56" x2="341" y2="456"/>
    <line x1="399" y1="56" x2="399" y2="456"/>
    <line x1="456" y1="56" x2="456" y2="456"/>
  </g>
  <g fill="none" stroke="rgba(255,255,255,.3)" stroke-width="6">
    <line x1="56" y1="113" x2="456" y2="113"/>
    <line x1="56" y1="170" x2="456" y2="170"/>
    <line x1="56" y1="227" x2="456" y2="227"/>
    <line x1="56" y1="284" x2="456" y2="284"/>
    <line x1="56" y1="341" x2="456" y2="341"/>
    <line x1="56" y1="399" x2="456" y2="399"/>
  </g>
  <!-- box borders -->
  <g stroke="#fff" stroke-width="14" fill="none">
    <rect x="56" y="56" width="171" height="171" rx="16"/>
    <rect x="284" y="56" width="171" height="171" rx="16"/>
    <rect x="56" y="284" width="171" height="171" rx="16"/>
    <rect x="284" y="284" width="171" height="171" rx="16"/>
  </g>
  <!-- number 9 -->
  <text x="256" y="296" font-size="220" font-weight="700" fill="#fff" text-anchor="middle" font-family="Inter,-apple-system,sans-serif" dominant-baseline="central" opacity="0.35">9</text>
